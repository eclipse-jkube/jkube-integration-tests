name: JKube E2E Tests (CRC-OKD)

on:
  workflow_dispatch:
  pull_request:
  schedule:
    - cron: '0 4 * * *' # Every day at 4am

concurrency:
  group: single-instance-for-crc-okd-cluster
  cancel-in-progress: true

env:
  SHELL: /bin/bash

jobs:
  build-jkube:
    name: Build JKube
    uses: ./.github/workflows/build-jkube.yml

  openshift-kubernetes-distribution:
    name: CRC ${{ matrix.crc }} / OKD ${{ matrix.okd }} / ${{ matrix.suite }}
    runs-on: ubuntu-latest
    needs: build-jkube
    strategy:
      fail-fast: false
      matrix:
        okd: [ v4.22.1 ]
        crc: [ 2.62.0 ]
        suite: ['quarkus', 'springboot', 'webapp', 'other']
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup Java 11
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: '11'
          distribution: 'temurin'
      # Restore the same caches populated by the build-jkube job (m2 first so the
      # SHA-keyed JKube cache wins for org/eclipse/jkube).
      - name: Restore third-party Maven dependencies
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~/.m2/repository
          key: m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: m2-
      - name: Restore JKube build
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ./jkube
            ~/.m2/repository/org/eclipse/jkube
          key: jkube-${{ needs.build-jkube.outputs.jkube-sha }}
      - name: Install required virtualization software
        run: |
          sudo apt-get update
          sudo apt install qemu-kvm libvirt-daemon libvirt-daemon-system
          # This package may not be present depending on Ubuntu version
          sudo apt install virtiofsd || true
          sudo usermod -a -G libvirt $USER
      - name: Remove unwanted stuff to free up disk image
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf \
            /opt/google/chrome \
            /opt/microsoft/msedge \
            /opt/microsoft/powershell \
            /opt/pipx \
            /usr/lib/mono \
            /usr/local/julia* \
            /usr/local/lib/android \
            /usr/local/lib/node_modules \
            /usr/local/share/chromium \
            /usr/local/share/powershell \
            /usr/share/dotnet \
            /usr/share/swift

          sudo docker image prune --all --force

          sudo swapoff -a
          sudo rm -f /mnt/swapfile
          sudo adduser $USER libvirt
          sudo adduser $USER kvm
          sudo usermod -a -G libvirt $USER
      - name: Download CRC
        run: |
          wget https://mirror.openshift.com/pub/openshift-v4/clients/crc/${{ matrix.crc }}/crc-linux-amd64.tar.xz
          tar -xJf crc-linux-amd64.tar.xz
          sudo cp crc-linux-${{ matrix.crc }}-amd64/crc /usr/local/bin/crc
      - name: Set the crc config
        run: |
          crc config set preset okd
          crc config set network-mode user
          crc config set bundle docker://quay.io/crcont/okd-bundle:4.22.0-okd-scos.6
      - name: Setup the crc
        run: |
          sudo -su $USER crc setup
      - name: Start the crc
        run: sudo -su $USER crc start
      - name: Determine JKube version
        id: jkube
        run: echo "version=$(./mvnw -q -f 'jkube/pom.xml' -Dexec.executable=echo -Dexec.args='${project.version}' --non-recursive exec:exec)" >> "$GITHUB_OUTPUT"
      - name: Install and Run Integration Tests
        run: ./mvnw -B -POpenShift,${{ matrix.suite }} verify -Djkube.version="${{ steps.jkube.outputs.version }}" -Djunit.jupiter.execution.parallel.config.fixed.parallelism=${{ matrix.suite == 'webapp' && '1' || '2' }}
